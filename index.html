<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Premium Scientific Calculator | OIBSIP</title>

    <meta name="description"
        content="Premium Scientific Calculator built using HTML, CSS and JavaScript for Oasis Infobyte Internship.">

    <meta name="author" content="Vaishali B">

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-animation"></div>

<div class="wrapper">

    <!-- History -->

    <aside class="history-panel">

        <div class="history-header">

            <h2>History</h2>

            <button id="clearHistory">

                <i class="fa-solid fa-trash"></i>

            </button>

        </div>

        <ul id="historyList"></ul>

    </aside>

    <!-- Calculator -->

    <main class="calculator">

        <!-- Header -->

        <div class="calculator-header">

            <div>

                <h1>Calculator</h1>

                <p>OIBSIP Project</p>

            </div>

            <button id="themeToggle">

                <i class="fa-solid fa-moon"></i>

            </button>

        </div>

        <!-- Clock -->

        <div class="clock">

            <span id="date"></span>

            <span id="time"></span>

        </div>

        <!-- Display -->

        <div class="display">

            <div id="expression"></div>

            <input type="text" id="display" readonly>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <!-- Scientific -->

            <button class="btn scientific" data-value="sin">sin</button>

            <button class="btn scientific" data-value="cos">cos</button>

            <button class="btn scientific" data-value="tan">tan</button>

            <button class="btn scientific" data-value="sqrt">√</button>

            <button class="btn scientific" data-value="square">x²</button>

            <button class="btn scientific" data-value="power">xʸ</button>

            <button class="btn scientific" data-value="log">log</button>

            <button class="btn scientific" data-value="ln">ln</button>

            <button class="btn scientific" data-value="pi">π</button>

            <button class="btn scientific" data-value="factorial">!</button>

            <!-- Main -->

            <button class="btn danger" data-value="C">C</button>

            <button class="btn danger" data-value="backspace">

                <i class="fa-solid fa-delete-left"></i>

            </button>

            <button class="btn operator" data-value="%">%</button>

            <button class="btn operator" data-value="/">÷</button>

            <button class="btn number" data-value="7">7</button>

            <button class="btn number" data-value="8">8</button>

            <button class="btn number" data-value="9">9</button>

            <button class="btn operator" data-value="*">×</button>

            <button class="btn number" data-value="4">4</button>

            <button class="btn number" data-value="5">5</button>

            <button class="btn number" data-value="6">6</button>

            <button class="btn operator" data-value="-">−</button>

            <button class="btn number" data-value="1">1</button>

            <button class="btn number" data-value="2">2</button>

            <button class="btn number" data-value="3">3</button>

            <button class="btn operator" data-value="+">+</button>

            <button class="btn number zero" data-value="0">0</button>

            <button class="btn number" data-value=".">.</button>

            <button class="btn equal" data-value="=">=</button>

        </div>

        <!-- Footer -->

        <div class="calculator-footer">

            <button id="copyResult">

                <i class="fa-solid fa-copy"></i>

                Copy

            </button>

        </div>

    </main>

</div>

<!-- Toast -->

<div id="toast"></div>

<script src="script.js"></script>

</body>

</html>
